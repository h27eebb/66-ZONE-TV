<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الدخول الآمنة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,#06152e,#0b2352,#123b84);
    position:relative;
}

/* تأثير الخلفية */
body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.05);
    filter:blur(25px);
}

body::before{
    width:320px;
    height:320px;
    top:-120px;
    right:-120px;
}

body::after{
    width:260px;
    height:260px;
    bottom:-100px;
    left:-100px;
}

/* الكارد */
.container{
    width:min(370px, calc(100vw - 40px));
    padding:35px 30px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(16px);
    border-radius:30px;
    text-align:center;
    color:#fff;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

/* أيقونة الويب */
.web-icon{
    width:95px;
    height:95px;
    margin:0 auto 25px;
    border-radius:26px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    box-shadow:0 15px 30px rgba(0,0,0,.3);
}

h1{
    font-size:30px;
    font-weight:700;
    margin-bottom:10px;
}

.desc{
    color:#d9e6ff;
    font-size:16px;
    margin-bottom:25px;
}

/* زر التلكرام */
.telegram-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    width:100%;
    height:58px;
    background:#229ED9;
    border-radius:18px;
    text-decoration:none;
    color:#fff;
    font-size:17px;
    font-weight:700;
    margin-bottom:25px;
    transition:.3s;
    box-shadow:0 10px 25px rgba(34,158,217,.35);
}

.telegram-btn:hover{
    background:#1c8bc4;
}

.telegram-btn svg{
    width:24px;
    height:24px;
    fill:#fff;
}

/* حقل الكود */
input{
    width:100%;
    height:60px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,.10);
    color:#fff;
    text-align:center;
    font-size:28px;
    letter-spacing:10px;
    outline:none;
    margin-bottom:18px;
}

input::placeholder{
    color:#a8b9d8;
}

/* زر الدخول */
button{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#0ea5e9,#38bdf8);
    color:#fff;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
}

button:hover{
    box-shadow:0 10px 25px rgba(56,189,248,.35);
}
</style>
</head>
<body>

<div class="container">

    <div class="web-icon">🌐</div>

    <h1>بوابة الدخول الآمنة</h1>

    <p class="desc">
        أدخل كود الدخول المكون من 4 أرقام
    </p>

    <a href="https://t.me/C9_9P" target="_blank" class="telegram-btn">
        <svg viewBox="0 0 24 24">
            <path d="M21.5 3.5L2.8 10.7c-1.3.5-1.3 1.3-.2 1.6l4.8 1.5 1.9 6c.3.8.1 1.1 1 .1l2.7-2.6 5.5 4c1 .6 1.7.3 2-.9l3.2-15c.4-1.5-.6-2.2-2.2-1.6z"/>
        </svg>
        الحصول على كود الدخول
    </a>

    <input type="password" id="code" maxlength="4" placeholder="••••">

    <button onclick="checkCode()">🔓 دخول</button>

</div>

<script>
function checkCode() {
    const code = document.getElementById("code").value;

    if (code === "2026") {
        window.location.href = "https://66zone.fwh.is";
    } else {
        alert("❌ كود الدخول غير صحيح");
    }
}
</script>

</body>
</html>
